services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      GITHUB_API_TOKEN: ${GITHUB_API_TOKEN}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
